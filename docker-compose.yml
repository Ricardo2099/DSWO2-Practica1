services:
  db:
    image: postgres:15
    container_name: empleados-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-empleados_db}
      POSTGRES_USER: ${POSTGRES_USER:-empleados_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-empleados_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-empleados_user} -d ${POSTGRES_DB:-empleados_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: empleados-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-empleados_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-empleados_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-empleados_pass}
      APP_AUTH_SESSION_TIMEOUT_MINUTES: ${APP_AUTH_SESSION_TIMEOUT_MINUTES:-30}
      APP_AUTH_MAX_FAILED_ATTEMPTS: ${APP_AUTH_MAX_FAILED_ATTEMPTS:-10}
      APP_AUTH_LOCK_DURATION_MINUTES: ${APP_AUTH_LOCK_DURATION_MINUTES:-15}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - internal-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: empleados-frontend
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal-net

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: empleados-reverse-proxy
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal-net

volumes:
  postgres_data:

networks:
  internal-net:
    driver: bridge
