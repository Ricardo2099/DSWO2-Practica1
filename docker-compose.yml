services:
  db:
    image: postgres:15
    container_name: empleados-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-empleados_db}
      POSTGRES_USER: ${POSTGRES_USER:-empleados_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-empleados_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-empleados_user} -d ${POSTGRES_DB:-empleados_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: empleados-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-empleados_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-empleados_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-empleados_pass}
      APP_SECURITY_BASIC_USERNAME: ${APP_SECURITY_BASIC_USERNAME:-admin}
      APP_SECURITY_BASIC_PASSWORD: ${APP_SECURITY_BASIC_PASSWORD:-admin123}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
