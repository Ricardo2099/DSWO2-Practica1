<section class="empleados-page">
  <header>
    <h1>Empleados</h1>
    <p>Gestion de empleados con permisos por rol.</p>
  </header>

  <app-empleado-form *ngIf="canManage" (submitEmpleado)="onCreateEmpleado($event)"></app-empleado-form>

  <div class="table-wrapper" *ngIf="!isLoading; else loadingTpl">
    <table mat-table [dataSource]="empleados" class="mat-elevation-z1">
      <ng-container matColumnDef="clave">
        <th mat-header-cell *matHeaderCellDef>Clave</th>
        <td mat-cell *matCellDef="let row">{{ row.clave }}</td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let row">{{ row.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="direccion">
        <th mat-header-cell *matHeaderCellDef>Direccion</th>
        <td mat-cell *matCellDef="let row">{{ row.direccion }}</td>
      </ng-container>

      <ng-container matColumnDef="telefono">
        <th mat-header-cell *matHeaderCellDef>Telefono</th>
        <td mat-cell *matCellDef="let row">{{ row.telefono }}</td>
      </ng-container>

      <ng-container matColumnDef="correo">
        <th mat-header-cell *matHeaderCellDef>Correo</th>
        <td mat-cell *matCellDef="let row">{{ row.correo }}</td>
      </ng-container>

      <ng-container matColumnDef="departamentoClave">
        <th mat-header-cell *matHeaderCellDef>Departamento</th>
        <td mat-cell *matCellDef="let row">{{ row.departamentoClave }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let row">
          <button
            mat-icon-button
            color="warn"
            aria-label="Eliminar empleado"
            *ngIf="canManage"
            (click)="deleteEmpleado(row.clave)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <p class="empty-state" *ngIf="empleados.length === 0">No hay empleados para mostrar.</p>
  </div>

  <ng-template #loadingTpl>
    <div class="loading-state">
      <mat-spinner diameter="44"></mat-spinner>
    </div>
  </ng-template>
</section>
